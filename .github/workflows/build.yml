name: Build AppX

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build AppX
        run: npm run build

      - name: Replace icons in AppX
        shell: pwsh
        run: |
          $appx = (Get-ChildItem dist\*.appx | Where-Object { $_.Name -notlike "*repack*" } | Select-Object -First 1).FullName
          $dir = "dist\appx_repack"
          New-Item -ItemType Directory -Force -Path "$dir\extracted"
          Copy-Item $appx "$dir\app.zip"
          Expand-Archive "$dir\app.zip" -DestinationPath "$dir\extracted" -Force
          Copy-Item "assets\Square44x44Logo.png" "$dir\extracted\assets\Square44x44Logo.png" -Force
          Copy-Item "assets\Square150x150Logo.png" "$dir\extracted\assets\Square150x150Logo.png" -Force
          Copy-Item "assets\Wide310x150Logo.png" "$dir\extracted\assets\Wide310x150Logo.png" -Force
          Copy-Item "assets\StoreLogo.png" "$dir\extracted\assets\StoreLogo.png" -Force
          $makeappx = (Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "makeappx.exe" | Select-Object -First 1).FullName
          Write-Host "Found makeappx at: $makeappx"
          & $makeappx pack /d "$dir\extracted" /p "dist\ZaappDo_final.appx" /o

      - name: Upload AppX
        uses: actions/upload-artifact@v4
        with:
          name: ZaappDo-appx
          path: dist/ZaappDo_final.appx
