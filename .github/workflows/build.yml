name: Build AppX

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build AppX
        run: npm run build
      - name: Upload AppX
        uses: actions/upload-artifact@v4
        with:
          name: ZaappDo-appx
          path: dist/*.appx
